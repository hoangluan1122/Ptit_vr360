<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111216" />
    <title>PTIT Game Lab Virtual Tour</title>
    <link rel="stylesheet" href="../../assets/tour-controls.css?v=2" />
    <link rel="stylesheet" href="../../assets/tour-navigation.css?v=1" />
    <style>
      :root { --red:#d71920; --glass:rgba(17,18,22,.76); font-family:Inter,"Segoe UI",Arial,sans-serif; }
      * { box-sizing:border-box; }
      html,body,#pano { width:100%; height:100%; margin:0; overflow:hidden; background:#111216; }
      .topbar { position:fixed; z-index:20; top:18px; right:18px; left:18px; height:64px; display:flex; align-items:center; gap:12px; padding:8px 10px; border:1px solid rgba(255,255,255,.16); border-radius:17px; background:var(--glass); color:#fff; box-shadow:0 16px 44px rgba(0,0,0,.22); backdrop-filter:blur(18px); }
      .map-back { display:inline-flex; align-items:center; gap:7px; height:42px; padding:0 12px; border-radius:10px; background:rgba(255,255,255,.09); color:rgba(255,255,255,.84); font-size:11px; font-weight:650; text-decoration:none; }
      .map-back:hover { background:rgba(255,255,255,.15); }
      .logo { display:grid; place-items:center; width:46px; height:46px; flex:0 0 auto; border-radius:12px; background:var(--red); font-size:12px; font-weight:800; }
      .brand { min-width:0; }
      .brand strong,.brand span { display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .brand strong { font-size:14px; }
      .brand span { margin-top:3px; color:rgba(255,255,255,.58); font-size:11px; }
      .scene-status { min-width:0; display:flex; align-items:center; gap:9px; margin-left:auto; padding:10px 13px; border-radius:11px; background:rgba(255,255,255,.09); color:rgba(255,255,255,.84); font-size:12px; }
      .status-dot { width:7px; height:7px; border-radius:50%; background:#ff5961; box-shadow:0 0 0 4px rgba(255,89,97,.14); }
      .loading { position:fixed; z-index:50; inset:0; display:grid; place-items:center; background:#111216; color:#fff; transition:opacity .5s,visibility .5s,background .25s; }
      .loading.preview-ready { background:rgba(17,18,22,.18); }
      .loading.done { opacity:0; visibility:hidden; pointer-events:none; }
      .loading-inner { width:min(280px,calc(100vw - 48px)); text-align:center; }
      .loading-mark { display:grid; place-items:center; width:58px; height:58px; margin:0 auto 22px; border-radius:16px; background:var(--red); font-size:14px; font-weight:800; }
      .loading-title { margin:0 0 18px; font-size:13px; font-weight:600; letter-spacing:.04em; }
      .loading-track { height:2px; overflow:hidden; border-radius:2px; background:rgba(255,255,255,.12); }
      .loading-bar { width:0; height:100%; background:#ff5a62; transition:width .22s ease; }
      .loading-percent { display:block; margin-top:10px; color:rgba(255,255,255,.72); font-size:11px; font-variant-numeric:tabular-nums; }
      .loading.compact { align-items:end; padding-bottom:82px; background:transparent; pointer-events:none; }
      .loading.compact .loading-inner { width:220px; padding:12px 14px; border:1px solid rgba(255,255,255,.14); border-radius:12px; background:rgba(17,18,22,.76); box-shadow:0 10px 30px rgba(0,0,0,.24); backdrop-filter:blur(14px); }
      .loading.compact .loading-mark { display:none; }
      .loading.compact .loading-title { margin-bottom:10px; font-size:11px; }
      .loading.compact .loading-percent { margin-top:7px; font-size:10px; }
      @media(max-width:620px){ .topbar{top:10px;right:10px;left:10px;height:58px}.logo{width:42px;height:42px}.brand span{display:none}.map-back span{display:none}.map-back{width:42px;padding:0;justify-content:center}.scene-status{max-width:130px;padding:9px 10px} }
    </style>
  </head>
  <body>
    <div id="pano"></div>
    <div id="loading" class="loading" role="progressbar" aria-live="polite" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="loading-inner">
        <div class="loading-mark">PTIT</div>
        <p class="loading-title">Đang mở không gian Game Lab</p>
        <div class="loading-track"><div class="loading-bar"></div></div>
        <span class="loading-percent">0%</span>
      </div>
    </div>
    <header class="topbar">
      <a class="map-back" href="../../index.html" aria-label="Quay lại bản đồ"><b>←</b><span>Bản đồ</span></a>
      <div class="logo" aria-hidden="true">PTIT</div>
      <div class="brand"><strong>Game Lab Virtual Tour</strong><span>Học viện Công nghệ Bưu chính Viễn thông</span></div>
      <div class="scene-status"><span class="status-dot"></span><span id="sceneTitle">Game Lab</span></div>
    </header>
    <nav class="tour-tools" aria-label="Thanh công cụ tham quan">
      <button class="tour-tool" data-tour-action="left" type="button" aria-label="Xoay trái">←</button>
      <button class="tour-tool" data-tour-action="right" type="button" aria-label="Xoay phải">→</button>
      <button class="tour-tool" data-tour-action="up" type="button" aria-label="Nhìn lên">↑</button>
      <button class="tour-tool" data-tour-action="down" type="button" aria-label="Nhìn xuống">↓</button>
      <span class="tour-tool-separator"></span>
      <button class="tour-tool" data-tour-action="zoom-in" type="button" aria-label="Phóng to">+</button>
      <button class="tour-tool" data-tour-action="zoom-out" type="button" aria-label="Thu nhỏ">−</button>
      <span class="tour-tool-separator"></span>
      <button class="tour-tool" data-tour-action="vr" type="button" aria-label="Chế độ VR"><svg viewBox="0 0 24 24"><path d="M3 8.5h18v8H16l-2.2-3h-3.6L8 16.5H3z"/><circle cx="7" cy="12" r="1"/><circle cx="17" cy="12" r="1"/></svg></button>
      <button class="tour-tool" data-tour-action="fullscreen" type="button" aria-label="Toàn màn hình"><svg viewBox="0 0 24 24"><path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5"/></svg></button>
    </nav>
    <script src="../../assets/tour-loading.js?v=1"></script>
    <script src="tour.js"></script>
    <script>
      const names={scene_game_0l:"Hành lang trước Game Lab",scene_game_1l:"Lối vào Game Lab",scene_game_2:"Khu máy tính · Góc trái",scene_game_3:"Không gian trung tâm",scene_game_4:"Khu máy tính · Góc phải",scene_game_5:"Khu thực hành phía trong",scene_game_6:"Cuối phòng Game Lab"};
      let lastScene="";
      embedpano({xml:"tour.xml",target:"pano",html5:"only",passQueryParameters:"startscene,startlookat",onready(instance){
        window.ptitKrpano=instance;
        window.ptitAttachTourLoader?.(instance);
        instance.call("delayedcall(0.3, skin_hideskin(instant); set(layer[skin_btn_show].visible,false); );");
        setInterval(()=>{const scene=instance.get("xml.scene")||"";if(scene&&scene!==lastScene){lastScene=scene;document.querySelector("#sceneTitle").textContent=names[scene]||"Game Lab";}},350);
      }});
    </script>
    <script src="../../assets/audio/background-music.js?v=2"></script>
    <script src="../../assets/tour-controls.js?v=2"></script>
    <script>
      window.PTIT_TOUR_NAV_CONFIG={
        title:"Sơ đồ PTIT Game Lab",
        floors:[{
          id:"game",label:"Phòng Game Lab",
          nodes:[
            {id:"g0",label:"Hành lang",short:"Hành lang",scene:"scene_game_0l",type:"entrance",x:8,y:52},
            {id:"g1",label:"Lối vào",short:"Lối vào",scene:"scene_game_1l",type:"lab",x:25,y:52},
            {id:"g2",label:"Góc trái",short:"Góc trái",scene:"scene_game_2",type:"lab",x:43,y:20},
            {id:"g3",label:"Trung tâm",short:"Trung tâm",scene:"scene_game_3",type:"lab",x:43,y:52},
            {id:"g4",label:"Góc phải",short:"Góc phải",scene:"scene_game_4",type:"lab",x:62,y:20},
            {id:"g5",label:"Phía trong",short:"Phía trong",scene:"scene_game_5",type:"lab",x:62,y:70},
            {id:"g6",label:"Cuối phòng",short:"Cuối phòng",scene:"scene_game_6",type:"lab",x:84,y:70}
          ],
          edges:[["g0","g1"],["g1","g2"],["g1","g3"],["g3","g4"],["g3","g5"],["g5","g6"]]
        }],
        guided:[
          {scene:"scene_game_0l",lookat:[0,0,105],title:"Chào mừng đến với Game Lab",description:"Bắt đầu hành trình từ hành lang phía trước phòng lab.",audio:"audio/guided/01-game-welcome.mp3",narration:"Xin chào! Chào mừng bạn đến với chuyến tham quan thực tế ảo PTIT Game Lab. Trong hành trình này, chúng ta sẽ khám phá không gian học tập, hệ thống máy tính và các khu vực thực hành bên trong phòng lab."},
          {scene:"scene_game_1l",lookat:[0,0,105],title:"Lối vào Game Lab",description:"Vị trí chuyển tiếp từ hành lang vào không gian thực hành.",audio:"audio/guided/02-game-entrance.mp3",narration:"Bạn đang ở lối vào PTIT Game Lab. Từ đây, bạn có thể quan sát cách bố trí tổng thể của phòng và di chuyển đến các khu vực máy tính ở hai bên."},
          {scene:"scene_game_2",lookat:[0,0,105],title:"Khu máy tính bên trái",description:"Một góc quan sát của hệ thống máy tính phục vụ thực hành.",audio:"audio/guided/03-game-left-computers.mp3",narration:"Đây là khu vực máy tính bên trái của phòng lab. Các máy được bố trí thành từng dãy, tạo điều kiện cho sinh viên học tập, thực hành và phối hợp làm việc theo nhóm."},
          {scene:"scene_game_3",lookat:[0,0,105],title:"Không gian trung tâm",description:"Điểm quan sát chính kết nối các khu vực trong Game Lab.",audio:"audio/guided/04-game-center.mp3",narration:"Bạn đang ở khu vực trung tâm của Game Lab. Từ vị trí này, có thể quan sát toàn bộ hệ thống máy tính, khu vực giảng dạy và những lối di chuyển chính trong phòng."},
          {scene:"scene_game_4",lookat:[0,0,105],title:"Khu máy tính bên phải",description:"Không gian máy tính và nhận diện ALCON Game Lab.",audio:"audio/guided/05-game-right-computers.mp3",narration:"Tiếp theo là khu vực máy tính bên phải. Không gian được thiết kế đồng bộ với màu sắc nhận diện của Game Lab và bố trí thiết bị theo hướng thuận tiện cho việc hướng dẫn thực hành."},
          {scene:"scene_game_5",lookat:[0,0,105],title:"Khu thực hành phía trong",description:"Khu vực học tập nằm sâu hơn bên trong phòng lab.",audio:"audio/guided/06-game-inner-area.mp3",narration:"Chúng ta đang tiến vào khu vực thực hành phía trong. Đây là nơi sinh viên tiếp tục làm việc trên hệ thống máy tính và triển khai các bài tập hoặc dự án liên quan đến trò chơi số."},
          {scene:"scene_game_6",lookat:[0,0,105],title:"Cuối phòng Game Lab",description:"Điểm quan sát cuối của tuyến tham quan.",audio:"audio/guided/07-game-end-area.mp3",narration:"Bạn đang ở điểm cuối của phòng Game Lab. Từ đây, bạn có thể nhìn lại toàn bộ không gian, các dãy máy tính và cách tổ chức khu vực học tập trong phòng."},
          {scene:"scene_game_6",lookat:[180,0,105],title:"Kết thúc chuyến tham quan",description:"Tiếp tục khám phá tự do hoặc quay lại bản đồ PTIT.",audio:"audio/guided/08-game-closing.mp3",narration:"Chuyến tham quan PTIT Game Lab xin được khép lại tại đây. Hy vọng hành trình đã giúp bạn hiểu rõ hơn về không gian học tập và thực hành của phòng lab. Cảm ơn bạn đã tham quan và hẹn gặp lại!"}
        ]
      };
    </script>
    <script src="../../assets/tour-navigation.js?v=1"></script>
  </body>
</html>
